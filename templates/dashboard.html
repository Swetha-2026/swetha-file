<!DOCTYPE html>
<html>
<head>
    <title>Internship Result</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #4f46e5, #7c3aed, #0d9488);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 18px;
            text-align: center;
            width: 380px;
            box-shadow: 0px 15px 35px rgba(0,0,0,0.3);
        }

        .score {
            font-size: 65px;
            font-weight: bold;
        }

        .status {
            font-size: 28px;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="card">

    <h3>{{ company }}</h3>

    <div class="score">{{ score }}%</div>

    <div class="status" style="color: {{ color }}">
        {{ status }}
    </div>

    <p>Internship Verification Result</p>

    <hr>

    <!-- DISCLAIMER -->
    <p style="font-size:12px; color:gray; margin-top:15px; line-height:1.4;">
        ⚠️ Disclaimer: This result is generated based on automated scoring using user input.
        It is for reference only and does not serve as an official verification certificate.
    </p>

</div>

</body>
</html>
