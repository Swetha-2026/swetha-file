<!DOCTYPE html>
<html>
<head>
    <title>Internship System</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #4f46e5, #7c3aed, #0d9488);
            font-family: Arial;
            color: white;
            text-align: center;
        }

        .box {
            padding: 40px;
        }

        h1 {
            font-size: 40px;
        }

        .btn {
            margin-top: 20px;
            padding: 15px 30px;
            border: none;
            background: white;
            color: #4f46e5;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            background: #e5e7eb;
        }
    </style>
</head>

<body>

<div class="box">

    <h1>Internship Verification System</h1>
    <p>Check internship authenticity easily</p>

    <a href="/form" class="btn">🚀 Get Started</a>

</div>

</body>
</html>
